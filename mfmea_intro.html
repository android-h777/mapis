        .layout {display: flex; padding: 20px 100px; flex-direction: row; align-items: center; height: 100vh;}
        .flexContainer {flex-direction: column; display: flex; flex: 1; align-items: flex-start;}
        .flexRow {flex-direction: row; display: flex; width: 100%;}
        .flexColumn {flex-direction: column; display: flex; width: 100%;}
        .flexRowDt {
            display: flex; 
            flex: 1; 
            flex-direction: column; 
            position: relative;

            border-radius: 20px;

        .flexRowDt:hover {

        .subText.type2 {

            border-bottom-left-radius: 20px;

        .iconBox {height: 200px;

        .iconBox2 {height: 200px;
            align-items: center;
            display: flex;
            background: linear-gradient(135deg, #1de9b6, #1a237e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .iconBox3 {
            background: linear-gradient(135deg, #fdd835 30%, #fff);

            -webkit-text-fill-color: transparent;
        }
        .iconBox4 {

        .iconBox5 {

        .imgBg::before {

            background: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSpj4CrrvwR-UDlYB7NbqxjqV3SynpzlDm6KQ&usqp=CAU);

            left: 0px;
            right: 0px;

        }
        .imgBg2::before {

            background-size: cover;

            position: absolute;
            top: 0px;
            left: 0px;
            right: 0px;

        .imgBg3::before {

            top: 0px;
            left: -88px;
            right: 0px;
            bottom: 0px;

        }
        .imgBg4::before {

            opacity: 1;
            position: absolute;
            top: 0px;
            left: 0px;
            right: 0px;
            bottom: 0px;

            opacity: 1;

            top: 0px;
            left: 0px;

            left: 0px;
            right: 0px;
            bottom: 0px;
            border-radius: 20px;
            background-position: 0px 0px;
        }      
        
        .aiBox {
            overflow: unset;
        }

        .aiBox:before {
            content: '';
            background: linear-gradient(90deg, #ff8a80, #ff80ab, #ea80fc, #b388ff, #8c9eff, #82b1ff, #80d8ff, #84ffff, #a7ffeb, #b9f6ca, #ccff90, #f4ff81, #ffff8d, #ffe57f, #ffd180, #ff9e80, #ff8a80);
            position: absolute;
            top: -5px;
            left:-5px;
            background-size: 400%;
            z-index: -1;
            filter: blur(8px);
            width: calc(100% + 10px);
            height: calc(100% + 10px);
            animation: glowing 30s linear infinite;
            opacity: 1;
            transition: opacity .3s ease-in-out;
            border-radius: 20px;
        }
        .aiBox:after {
            z-index: -1;
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url(img/fmea_bg.jpg);
            background-size: cover;
            background-position: -150px 0px;
            left: 0;
            top: 0;
            border-radius: 20px;
            opacity: 0.8;
        }
        .aiBox:hover::before {
            animation: glowing 5s linear infinite;
        }
        .aiBox.type1:after {
            background: url(img/20230628113241.jpg);
            background-size: cover;
            background-position: 0px -140px;
            opacity: 0.9;
        }
        .aiBox.type2:after {
            background: url(img/4-Caveats-For-LD-Professionals-When-Using-Chat-GPT.jpg);
            background-size: cover;
            background-position: 0px -110px;
            opacity: 0.9;
            background-position-x: center;
        }
        .aiBox.type3:after {
            background: url(img/img.jpg);
            background-size: cover;
            background-position: 0px -50px;
            opacity: 0.9;
        }
        .aiBox.type4:after {
            background: url(img/business_writing_on_paper_1200x627.webp);
            background-size: cover;
            background-position: bottom;
            opacity: 0.8;
        }

        .overlay {
            position: absolute;
            width: 100vw;
            height: 100vh;
            top: 0;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 1;
            display: none;
        }

            z-index: 1 !important;
        }
        .modalCont{

            min-width: 500px;
            min-height: 500px;

            z-index: 11;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px;
            display: none;
        }
        .actCard.on {
            box-shadow: 0 24px 38px 3px rgba(0, 0, 0, 0.14),  0 9px 46px 8px rgba(255, 255, 255, 0.12), 0 11px 15px -7px rgba(255, 255, 255, 0.4);
            z-index: 10;
        }

        .gradient-text {
            font-weight: 700; /* 글자 굵기 */
            background: linear-gradient(90deg, #ff6f61, #de47ac, #6e40c9, #ff6f61); /* 그라데이션 색상 */
            background-size: 400% 400%; /* 배경 크기를 키워 애니메이션 효과를 부드럽게 */
            -webkit-background-clip: text; /* 배경을 텍스트에 클리핑 */
            background-clip: text; /* 표준 속성 */
            color: transparent; /* 텍스트 색상을 투명하게 설정해 그라데이션만 보이게 */
            animation: moveGradient 4s linear infinite; /* 애니메이션 적용 */
        }

        /* 그라데이션 이동 애니메이션 */
        @keyframes moveGradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        .logo {
            background: linear-gradient(135deg, rgb(0, 107, 213), rgb(141, 0, 115)) text;
        }
        
        .titLogo {

        .titLogo .tit span.sfa, nav .logo .tit span.sfa {

        .titLogo .tit span.apis, nav .logo .tit span.apis, .popup .logo {

        .titLogo .sub {
            font-size: 13px;
            letter-spacing: 0px;
            margin-top: -10px;
            display: inline-block;
        }
    </style>

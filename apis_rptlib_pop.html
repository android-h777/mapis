<!DOCTYPE html lang="en">
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MAPIS · Report Detail</title>
	<link rel="preload" href="mapis_lib/font/material-symbols-outlined.woff2" as="font" type="font/woff2">
	<link href="mapis_lib/css/material-symbols-local.css" type="text/css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="mapis_lib/css/lib/mpm_materialize.css">

<body class="popup">
	<!-- MAPIS 팝업 표준 헤더 (eln_pop_simple 미러: 로고 + [코드]제목 + roundBox 상태 + 우측 액션) -->
	<header class="z-depth-1">
		<section class="titArea npi">
			<div><img src="img/MAPISLogo-25.png"></div>
			<div class="statusTit">
				<div class="tit"><span class="rlPopCode" id="popCode"></span><span id="popTitle"></span></div>
				<div class="roundBox" id="popApprState" style="display:none"></div>
					<a class="waves-effect waves-light hBtn hViva rlApprBtn" data-act="approval"><i class="material-symbols-outlined left">local_library</i><span class="label">Approval</span></a>
			</div>
			<a class="rlInfoToggle on" data-act="info" title="Show / hide details panel"><span class="lbl">Details</span><i class="material-symbols-outlined cv">chevron_right</i></a>
		</section>
	</header>

	<!-- 본문: Report Detail (2-pane) — 50px 고정 헤더 아래 채움 -->
	<div class="rlPopArea">

		<!-- 2-pane -->
		<div class="rlPopBody">
			<!-- Document pane -->
			<section class="rlDocPane">
				<div class="rlDocBar">
					<div class="rlSeg" id="viewSeg">
						<a class="on" data-view="doc"><i class="material-symbols-outlined">description</i>Document</a>
						<a data-view="raw"><i class="material-symbols-outlined">picture_as_pdf</i>Original</a>
						<a data-view="text"><i class="material-symbols-outlined">subject</i>Text</a>
					</div>
					<div class="rlDocActs" id="docActs"></div>
						<div class="rlFind">
						<div class="aniInput"><input type="text" class="browser-default" id="findInput" placeholder="Find in document" autocomplete="off"><span class="focus-border"></span></div>
						<span class="rlFindNav"><span class="cnt" id="findCount">0 / 0</span>
							<i class="material-symbols-outlined" id="findPrev" title="Previous">keyboard_arrow_up</i>
							<i class="material-symbols-outlined" id="findNext" title="Next">keyboard_arrow_down</i></span>
					</div>
				</div>
				<div class="rlDocScroll hScroll" id="docScroll"><!-- JS --></div>
			</section>

		</div>
		<!-- Information pane — 우측 슬라이드오버 패널(토글로 숨김/표시) -->
		<aside class="rlInfoPane open" id="infoPane"><!-- JS --></aside>
	</div>

	<!-- 결재(Approval) 모달 — JS가 채움. window.open 팝업 내부 오버레이 -->
	<div class="rlModalWrap" id="rlApprModal"></div>

	<div class="rlToastWrap" id="rlToastWrap"></div>

	<script>
	/* ════════════════════════════════════════════════════════════
	   Technical Report Hub — Report Detail / Reading View (목업).
	   2-pane(Document + Information) + 액션 툴바. Document/Text 토글.
	   문서 내 검색 + 키워드 하이라이트(리스트에서 넘어온 ?q= 프리필 + 직접 find).
	   엔진=목업: 문서를 "PDF처럼 스타일된 HTML"로 렌더 → 하이라이트=<mark> 문자열 매칭.
	   ════════════════════════════════════════════════════════════ */
	var INDEXES={CN:'CN — Shanghai',DE:'DE — Leverkusen',IN:'IN — Bangalore',IT:'IT — Termoli',JP:'JP — Ohta',KR:'KR — All Regions',TH:'Thailand',UK:'UK — Abingdon',US:'US — All Regions'};
	function idxName(id){ return INDEXES[id]||id; }
	var TYPES={TIS:'TIS Report',TMR:'Tech / Market Review',PTM:'Process Transfer Memo',Trip:'Trip Report',IP:'Improvement Project'};
	function typeName(t){ return TYPES[t]||t; }
	var CLASSES={1:{nm:'Class 1 · Public',lock:false},2:{nm:'Class 2 · Internal',lock:false},3:{nm:'Class 3 · Confidential',lock:true},4:{nm:'Class 4 · Highly Restricted',lock:true}};
	var SEGMAP={Elastomers:'Performance Additives',Fluids:'Silicone Fluids',Coatings:'Coatings & Release',Resins:'Resins',Sealants:'Sealants & Adhesives',Specialty:'Specialty Fluids',Additives:'Urethane Additives','Personal Care':'Consumer Solutions'};
	function segOf(bu){ return SEGMAP[bu]||bu; }
	var MY_REGION='US';

	var REPORTS=[
		{code:'LEV-24-02',title:'Bio-based Silicone Feasibility Study (JDA)',type:'TIS',site:'LEV',idx:'DE',author:'Dr. Stephan Boß',bu:'Elastomers',date:'2026-06-14',cls:4,hits:162},
		{code:'KR-23-11',title:'Low-Temperature Cure Silicone for Flexible Display',type:'TIS',site:'KR',idx:'KR',author:'S.Y. Park',bu:'Specialty',date:'2026-06-12',cls:3,hits:274},
		{code:'ITC-22-31',title:'Antifoam Improvement Project — Phase 2',type:'IP',site:'ITC',idx:'IN',author:'Indumathi M.',bu:'Fluids',date:'2026-06-10',cls:2,hits:176},
		{code:'LEV-23-07',title:'Development of a Baking Paper Release Coating',type:'TIS',site:'LEV',idx:'DE',author:'Markus Bley',bu:'Coatings',date:'2026-06-05',cls:2,hits:352},
		{code:'TML-22-02',title:'Resin Intermediate Process Transfer Memorandum',type:'PTM',site:'TML',idx:'IT',author:'G. Rossi',bu:'Resins',date:'2026-05-28',cls:2,hits:205},
		{code:'KR-22-03',title:'OLED Encapsulation Adhesive — Scale-up Request',type:'PTM',site:'KR',idx:'KR',author:'J.P. Kim',bu:'Specialty',date:'2026-05-20',cls:2,hits:298},
		{code:'SH-21-08',title:'Defoamer Performance in Architectural Coatings',type:'TIS',site:'SH',idx:'CN',author:'Wei Zhang',bu:'Coatings',date:'2026-04-30',cls:2,hits:241},
		{code:'ABD-20-15',title:'Specialty Fluids for Personal Care Formulations',type:'TMR',site:'ABD',idx:'UK',author:'J. Whitfield',bu:'Personal Care',date:'2026-04-18',cls:1,hits:233},
		{code:'TT-18-12',title:'Water Phase Sensory Elastomer',type:'TIS',site:'TT',idx:'US',author:'Mukesh Kumar',bu:'Elastomers',date:'2026-03-22',cls:2,hits:359},
		{code:'SV-19-06',title:'Urethane Additives Applications Guide',type:'TMR',site:'SV',idx:'US',author:'L. Heisler',bu:'Additives',date:'2026-02-15',cls:2,hits:432},
		{code:'WTC-11-29',title:'In-situ Functionalized Nano Ceria Dispersions',type:'TIS',site:'WTC',idx:'IN',author:'Asha Jhonsi, Karthikeyan M.',bu:'Fluids',date:'2026-01-20',cls:2,hits:554},
		{code:'JPN-15-04',title:'Patent Survey for UV Curable Frontsheet',type:'TIS',site:'JPN',idx:'JP',author:'Kazuhisa Ono',bu:'Specialty',date:'2025-12-08',cls:3,hits:518},
		{code:'TT-12-16',title:'Silicone Fluids Technology Highlights — Annual',type:'TMR',site:'TT',idx:'US',author:'Global Silicone Fluids Tech',bu:'Fluids',date:'2025-11-30',cls:3,hits:374},
		{code:'JPN-10-07',title:'Effect of Crosslinkage and Reinforcement',type:'TIS',site:'JPN',idx:'JP',author:'H. Sato',bu:'Elastomers',date:'2025-10-05',cls:2,hits:572},
		{code:'TT-11-16',title:'Hydrosilylation with Iron-Pyridine Catalysts',type:'TIS',site:'TT',idx:'US',author:'Kenrick M. Lewis',bu:'Additives',date:'2025-06-25',cls:2,hits:798},
		{code:'LEV-20-27',title:'Liquid Silicone Rubber — Handbook of Processing',type:'TIS',site:'LEV',idx:'DE',author:'Enise Michalski',bu:'Elastomers',date:'2025-05-15',cls:2,hits:1441}
	];
	var SUMMARIES={
		'LEV-24-02':'Joint development assessment of bio-based silicone backbones from renewable feedstock; evaluates cure behavior, mechanical properties and cost parity versus petroleum-based grades.',
		'KR-23-11':'A low-temperature platinum-cure silicone for flexible OLED displays, characterizing cure kinetics below 100 °C and adhesion to polyimide substrates.',
		'ITC-22-31':'Phase-2 antifoam improvement project optimizing siloxane polyether dispersions to reduce foam in pulp and paper processing; includes plant trial data.',
		'LEV-23-07':'Development of a solvent-free silicone release coating for baking paper, balancing release force and anchorage on supercalendered kraft.',
		'TML-22-02':'Process transfer memorandum for a resin intermediate, detailing reactor parameters, distillation cuts and quality limits for scale-up at Termoli.',
		'KR-22-03':'Scale-up request for an OLED encapsulation adhesive, summarizing rheology, moisture-barrier performance and pot-life under production conditions.',
		'SH-21-08':'Comparative study of silicone defoamer performance in architectural water-based coatings, ranking persistence and recoatability.',
		'ABD-20-15':'Technology and market review of specialty fluids for personal-care formulations, covering sensory profiles and regulatory status in the EU and US.',
		'TT-18-12':'Water-phase sensory elastomer study evaluating thickening efficiency and skin-feel in cosmetic emulsions.',
		'SV-19-06':'Applications guide for urethane additive surfactants in flexible and rigid foam, with cell-structure and stability recommendations.',
		'WTC-11-29':'In-situ functionalized nano ceria dispersions for chemical-mechanical planarization, describing particle-size control and abrasive selectivity.',
		'JPN-15-04':'Patent landscape survey for UV-curable frontsheet materials in photovoltaic modules, identifying white-space and freedom-to-operate risks.',
		'TT-12-16':'Annual technology highlights for the silicone fluids portfolio, summarizing new hydrosilylation catalysts and emulsion advances.',
		'JPN-10-07':'Effect of crosslink density and silica reinforcement on the tensile and tear strength of high-consistency silicone rubber.',
		'TT-11-16':'Hydrosilylation catalyzed by iron–pyridine diimine complexes as a platinum-free alternative; reports kinetics and selectivity at 80 °C.',
		'LEV-20-27':'Handbook of liquid silicone rubber processing, covering injection molding, cure rheology and demolding for LSR parts.'
	};
	function repByCode(c){ return REPORTS.filter(function(r){return r.code===c;})[0]; }
	function summaryOf(c){ return SUMMARIES[c]||''; }
	function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
	function getParam(n){ var m=new RegExp('[?&]'+n+'=([^&]*)').exec(location.search); return m?decodeURIComponent(m[1].replace(/\+/g,' ')):''; }
	/* 최근 본 문서 기록(이어보기) — localStorage 'rlRecentDocs'(검색기록 'rlRecent'과 별개). Summary가 읽어 카드로 표시. */
	function rlPushRecent(code){ try{ var a=JSON.parse(localStorage.getItem('rlRecentDocs'))||[]; a=a.filter(function(c){return c!==code;}); a.unshift(code); localStorage.setItem('rlRecentDocs', JSON.stringify(a.slice(0,10))); }catch(e){} }

	function toast(msg, kind){
		var ic={ok:'check_circle',info:'info',warn:'lock',mocha:'bolt'}[kind||'info']||'info';
		var el=document.createElement('div'); el.className='rlToast '+(kind||'info');
		el.innerHTML='<i class="material-symbols-outlined">'+ic+'</i><span>'+esc(msg)+'</span>';
		document.getElementById('rlToastWrap').appendChild(el);
		setTimeout(function(){ el.classList.add('fade'); setTimeout(function(){ el.remove(); },260); }, 2400);
	}
	function classBadge(c){ var ci=CLASSES[c]||CLASSES[2]; return '<span class="rlClassBadge c'+c+'">'+(ci.lock?'<i class="material-symbols-outlined">lock</i>':'')+'C'+c+'</span>'; }

	/* ── 문서 본문(목업) — 보고서 필드에서 섹션 생성. 검색어가 본문에 박히도록 구성 ── */
	function buildDoc(r){
		var sum=summaryOf(r.code), topic=r.title.replace(/\s*\(.*?\)\s*/g,'');
		return [
			{tag:'h1', text:r.title},
			{tag:'meta', text:r.code+'  ·  '+typeName(r.type)+'  ·  '+r.author+'  ·  '+idxName(r.idx)+'  ·  '+r.date},
			{tag:'h2', text:'Abstract'},
			{tag:'p', text:sum},
			{tag:'h2', text:'1. Introduction'},
			{tag:'p', text:'This '+typeName(r.type)+' summarizes work carried out by the '+r.bu+' group ('+segOf(r.bu)+') at '+idxName(r.idx)+'. The study addresses '+topic.toLowerCase()+' with a focus on reproducibility, scale-up readiness and alignment with Momentive Global Technology priorities.'},
			{tag:'p', text:'Prior internal reports established the baseline performance for this chemistry. The present work extends that baseline and documents the experimental conditions, key results and recommendations for the '+r.bu+' portfolio.'},
			{tag:'h2', text:'2. Experimental'},
			{tag:'p', text:'Materials were prepared following standard '+r.bu+' protocols. Samples were characterized for the properties most relevant to '+topic.toLowerCase()+'. All measurements were performed in triplicate and reported as mean values; instrument calibration followed the '+idxName(r.idx)+' laboratory quality plan.'},
			{tag:'h2', text:'3. Results & Discussion'},
			{tag:'p', text:'The results confirm the trends anticipated from the abstract. Across the conditions evaluated, the formulation showed a favorable balance of performance and processability. '+r.author+' notes that the observed behavior is consistent with the proposed mechanism and supports the recommended direction for further development.'},
			{tag:'p', text:'A sensitivity analysis indicated that the dominant factor is the cure/processing window; secondary factors had a smaller but measurable effect. These findings are directly applicable to ongoing '+segOf(r.bu)+' projects.'},
			{tag:'h2', text:'4. Conclusion'},
			{tag:'p', text:'In summary, this report demonstrates a viable path for '+topic.toLowerCase()+'. The '+r.bu+' team recommends advancing to the next development stage, with the experimental details above serving as the reference baseline. Questions may be directed to '+r.author+' ('+idxName(r.idx)+').'}
		];
	}

	/* ── 하이라이트(전역 match index 부여 → find 내비게이션) ── */
	var _mid=0;
	function hlDoc(text, q){
		if(!q) return esc(text);
		var lo=String(text).toLowerCase(), ql=q.toLowerCase(), out='', i=0, p;
		if(!ql) return esc(text);
		while((p=lo.indexOf(ql,i))>=0){ out+=esc(text.slice(i,p))+'<mark id="m'+(_mid++)+'">'+esc(text.slice(p,p+ql.length))+'</mark>'; i=p+ql.length; }
		return out+esc(text.slice(i));
	}

	var CUR, BLOCKS, view='doc', matchTotal=0, curMatch=-1;

	function renderInfo(r){
		var locked=(r.cls>=3 && r.idx!==MY_REGION);
		var rel=REPORTS.filter(function(x){return x.code!==r.code && (x.bu===r.bu||x.type===r.type);}).slice(0,4);
		var kws=[r.bu, segOf(r.bu), typeName(r.type)].concat(r.title.split(/[\s,—-]+/).filter(function(w){return w.length>4;}).slice(0,4));
		// 단일 흐름형 패널(cardBox 분리 → 헤더 + subTit 섹션). 슬라이드오버.
		var html='<div class="rlInfoHead"><span><i class="material-symbols-outlined">info</i>Details</span><i class="material-symbols-outlined rlInfoClose" id="infoClose" title="Hide panel">close</i></div><div class="rlInfoBody">';
		html+= infoRow('Document #', r.code)+infoRow('Type', typeName(r.type))+infoRow('Author', r.author)+
			infoRow('Site / Region', r.site+' · '+idxName(r.idx))+infoRow('Business Unit', r.bu)+infoRow('Segment', segOf(r.bu))+
			infoRow('Date', r.date);
		// Classification — 클릭 시 3개 게이트 질문/답(APPR.steps 재사용) 펼침
		var clsNm=(CLASSES[r.cls]||{}).nm||('Class '+r.cls);
		html+='<div class="rlInfoRow rlClsRow" id="clsRow"><span class="k">Classification</span><span class="v">'+esc(clsNm)+(locked?' <span class="rlLockTag">region-restricted</span>':'')+'<i class="material-symbols-outlined clsCaret">expand_more</i></span></div>';
		if(APPR && APPR.steps){ var gOrder=[APPR.steps[0], APPR.steps[2], APPR.steps[1]]; html+='<div class="rlGateDetail" id="gateDetail" style="display:none">'+gOrder.map(function(g,i){ return '<div class="rlGateRow"><span class="gnum">'+(i+1)+'</span><span class="gbody"><span class="gq">'+esc(g.q)+'</span><span class="ga">'+esc(g.a)+'</span></span></div>'; }).join('')+'</div>'; }
		html+='<div class="subTit">Abstract</div><div class="rlAbs">'+esc(summaryOf(r.code))+'</div>';
		html+='<div class="subTit">Keywords</div><div class="rlKws">'+kws.map(function(k){return '<span>'+esc(k)+'</span>';}).join('')+'</div>';
		html+='<div class="subTit">Related reports</div><div class="rlRel">'+
			(rel.length?rel.map(function(x){return '<a class="rlRelItem" href="apis_rptlib_pop.html?code='+encodeURIComponent(x.code)+'"><span class="t">'+esc(x.title)+'</span><span class="s"><span class="code">'+esc(x.code)+'</span> · '+esc(typeName(x.type))+'</span></a>';}).join(''):'<div class="rlRelEmpty">No related reports.</div>')+'</div>';
		html+='</div>';
		document.getElementById('infoPane').innerHTML=html;
	}
	/* 우측 정보 패널 토글(슬라이드오버 숨김/표시) */
	function toggleInfo(){ var p=document.getElementById('infoPane'); if(!p) return; var on=p.classList.toggle('open'); var btn=document.querySelector('[data-act="info"]'); if(btn) btn.classList.toggle('on', on); }
	/* Classification 행 클릭 → 3개 게이트 질문/답 펼치기 */
	function toggleGate(){ var d=document.getElementById('gateDetail'), r=document.getElementById('clsRow'); if(!d) return; var open=d.style.display==='none'; d.style.display=open?'block':'none'; if(r) r.classList.toggle('open', open); }
	function infoRow(k,v){ return '<div class="rlInfoRow"><span class="k">'+esc(k)+'</span><span class="v">'+esc(v)+'</span></div>'; }

	function renderActs(r){
		var locked=(r.cls>=3 && r.idx!==MY_REGION);
		document.getElementById('popCode').textContent=r.code+' · '+typeName(r.type);
		document.getElementById('popTitle').innerHTML=esc(r.title)+' '+classBadge(r.cls);
		// 헤더 액션(Approval·Details)은 정적 마크업. 여기선 문서 툴바 액션만 렌더.
		// 문서 툴바 = 문서 레벨 액션(라벨): Download · Print · Basket · Share
		var da=document.getElementById('docActs');
		if(da) da.innerHTML=
			actBtn('download', locked?'lock':'download', locked?'Restricted':'Download')+
			actBtn('print','print','Print')+
			actBtn('basket','add_shopping_cart','Basket');
		renderApprState();
	}
	/* 문서 레벨 액션(라벨 hBtn) — 문서 툴바(docActs)에 배치 */
	function actBtn(act,ic,label){ return '<a class="waves-effect waves-light hBtn" data-act="'+act+'" title="'+label+'"><i class="material-symbols-outlined left">'+ic+'</i><span class="label">'+label+'</span></a>'; }

	/* ════════════════════════════════════════════════════════════
	   결재(Approval) — 문서 팝업 내 결재 모달 (MAPIS 결재 패턴 미러).
	   체인: Step 1 Manager(순차 게이트) → Step 2 GT&C Leader · Technology CoE Leader(병렬, 둘 다 필수).
	   모드(?mode=): approve(승인자, MAPIS To-Do 딥링크) · owner(작성자, Initiate) · 기본 view(읽기).
	   상태=목업(인메모리). N=3, X=승인수. 완료 시 채번/발행은 toast로 표현.
	   ════════════════════════════════════════════════════════════ */
	function notify(seq){ seq.forEach(function(n,i){ setTimeout(function(){ toast(n.msg, n.kind); }, i*340); }); }
	var APPR=null, apprMode='view';
	function buildAppr(r){
		var m=getParam('mode'); apprMode=(m==='approve'||m==='owner')?m:'view';
		// 분류 게이트 답 = 업로더가 입력(클래스에서 역산). 승인자는 자기 게이트만 검토.
		var jda = r.cls>=3 ? ('Yes → Class '+r.cls) : 'No';
		var ext = r.cls>=3 ? 'n/a (JDA applies)' : (r.cls===1 ? 'Yes → Class 1' : 'No → Class 2');
		var steps=[
			{fn:'Manager',               who:'Line Manager (auto)', step:1, state:'approved', q:'Export-controlled / ITAR?',             a:'No — EAR99'},
			{fn:'GT&C Leader',           who:'D. Hartmann',         step:2, state:'pending',  q:'Approved for external circulation?',     a:ext},
			{fn:'Technology CoE Leader', who:'A. Raghuram',         step:2, state:'pending',  q:'Under JDA / confidentiality agreement?', a:jda}
		];
		if(apprMode==='owner'){ steps.forEach(function(s){ s.state='idle'; }); }
		APPR={status:'inApproval', steps:steps}; apprRecompute(); return APPR;
	}
	function apprDone(){ return APPR.steps.filter(function(s){return s.state==='approved';}).length; }
	function apprTotal(){ return APPR.steps.length; }
	function apprRecompute(){
		var s=APPR.steps;
		if(s.every(function(x){return x.state==='approved';})) APPR.status='approved';
		else if(s.some(function(x){return x.state==='rejected';})) APPR.status='rejected';
		else if(s.every(function(x){return x.state==='idle';})) APPR.status='draft';
		else APPR.status='inApproval';
	}
	function apprBadge(){
		if(APPR.status==='approved') return {ic:'task_alt',txt:'Approved',cls:'ok'};
		if(APPR.status==='rejected') return {ic:'cancel',txt:'Rejected',cls:'rej'};
		if(APPR.status==='draft')    return {ic:'edit_note',txt:'Draft — not submitted',cls:'draft'};
		return {ic:'pending',txt:'In Approval · '+apprDone()+'/'+apprTotal(),cls:'ing'};
	}
	function renderApprState(){ var b=apprBadge(), el=document.getElementById('popApprState'); if(!el) return; var col={ing:'blue',ok:'green',rej:'red',draft:'grey'}[b.cls]||'blue'; var short={approved:'Approved',rejected:'Rejected',draft:'Draft',inApproval:'In Approval'}[APPR.status]||'In Approval'; el.className='roundBox '+col; el.textContent=short; el.style.display=''; }
	function stepActionable(s){ if(s.state!=='pending') return false; if(s.step===2) return APPR.steps[0].state==='approved'; return true; }
	function apprModalHtml(){
		var b=apprBadge();
		var clsNm=(CLASSES[CUR.cls]||{}).nm||('Class '+CUR.cls);
		function stBox(state){ var m={approved:['green','Approved'],pending:['blue','In Progress'],rejected:['red','Rejected'],idle:['grey','Not started']}[state]||['grey','Not started']; return '<span class="roundBox '+m[0]+'">'+m[1]+'</span>'; }
		function node(st,i){
			var canAct=(apprMode==='approve' && stepActionable(st));
			var waiting=(st.step===2 && APPR.steps[0].state!=='approved' && st.state==='pending');
			var act = canAct
				? '<div class="nodeAct"><a class="waves-effect waves-light hBtn hGreen apprDo" data-i="'+i+'" data-do="approve"><i class="material-symbols-outlined left">check</i><span class="label">Approve</span></a><a class="waves-effect waves-light hBtn hViva apprDo" data-i="'+i+'" data-do="reject"><i class="material-symbols-outlined left">block</i><span class="label">Reject</span></a></div>'
				: waiting ? '<div class="nodeAct"><span class="rlApprWait">waiting for Step 1</span></div>' : '';
			return '<div class="rlApprNode '+st.state+'">'+
				'<div class="nodeTop"><span class="fn">'+esc(st.fn)+'</span>'+stBox(st.state)+'</div>'+
				'<div class="nodeWho"><i class="material-symbols-outlined">person</i>'+esc(st.who)+'</div>'+
				'<div class="nodeGate"><div class="gq">'+esc(st.q)+'</div><div class="ga">'+esc(st.a)+'</div></div>'+act+'</div>';
		}
		var flow='<div class="rlApprCol"><div class="rlApprColHd">Step 1</div>'+node(APPR.steps[0],0)+'</div>'+
			'<div class="rlApprArrow"><i class="material-symbols-outlined">chevron_right</i></div>'+
			'<div class="rlApprCol"><div class="rlApprColHd">Step 2 <span class="par">parallel · both required</span></div><div class="rlApprColNodes">'+node(APPR.steps[1],1)+node(APPR.steps[2],2)+'</div></div>';
		var foot='';
		if(apprMode==='owner' && APPR.status==='draft')
			foot='<div class="rlApprFootBar"><span class="note"><i class="material-symbols-outlined">bolt</i>Initiate &rarr; To-Do to your manager (Step 1), then GT&amp;C &amp; Technology CoE in parallel.</span><a class="waves-effect waves-light hBtn apprInit" id="apprInit"><i class="material-symbols-outlined left">send</i><span class="label">Initiate Approval</span></a></div>';
		else if(apprMode==='approve')
			foot='<div class="rlApprFootBar"><span class="note"><i class="material-symbols-outlined">info</i>You verify the uploader&rsquo;s classification answer for your gate. Reject returns it to the author.</span></div>';
		return '<div class="rlApprCard">'+
			'<div class="rlApprBar"><div class="rlApprBarL"><i class="material-symbols-outlined">how_to_reg</i><span class="ttl">Approval</span><span class="code">'+esc(CUR.code)+'</span><span class="roundBox '+({ing:'blue',ok:'green',rej:'red',draft:'grey'}[b.cls]||'blue')+'">'+esc(b.txt)+'</span><span class="rlApprCls">'+esc(clsNm)+'</span></div><i class="material-symbols-outlined rlApprX" id="apprClose">close</i></div>'+
			'<div class="rlApprFlow">'+flow+'</div>'+foot+'</div>';
	}
	/* Approval = 상단 슬라이드다운 레이어(모달 아님, 비차단). 토글로 상시 켜둘 수 있음 */
	function renderApprLayer(){ var w=document.getElementById('rlApprModal'); if(w) w.innerHTML=apprModalHtml(); }
	function apprBtnOn(on){ var b=document.querySelector('[data-act="approval"]'); if(b) b.classList.toggle('on', on); }
	function openApprModal(){ var w=document.getElementById('rlApprModal'); renderApprLayer(); void w.offsetWidth; w.classList.add('show'); apprBtnOn(true); }
	function closeApprModal(){ var w=document.getElementById('rlApprModal'); w.classList.remove('show'); apprBtnOn(false); }
	function toggleApprLayer(){ var w=document.getElementById('rlApprModal'); if(w.classList.contains('show')) closeApprModal(); else openApprModal(); }
	function apprAct(i,verb){
		var st=APPR.steps[i]; if(!st) return;
		if(verb==='approve'){
			st.state='approved'; apprRecompute(); renderApprState(); renderApprLayer();
			if(APPR.status==='approved') notify([{msg:'All approvals complete — '+CUR.code+' published.',kind:'ok'},{msg:'Report number stamped on the cover page.',kind:'mocha'}]);
			else toast('Approved as '+st.fn+'. '+apprDone()+'/'+apprTotal()+' done.','ok');
		} else {
			var why=prompt('Reason for rejection (required) — returned to the author:');
			if(why===null) return;
			if(!why.trim()){ toast('A reason is required to reject.','warn'); return; }
			st.state='rejected'; apprRecompute(); renderApprState(); renderApprLayer();
			toast('Rejected — returned to author with your reason.','warn');
		}
	}
	function apprInitiate(){
		APPR.steps.forEach(function(s){ s.state='pending'; }); apprMode='view'; apprRecompute(); renderApprState(); renderApprLayer();
		notify([{msg:'Approval initiated for '+CUR.code+'.',kind:'ok'},{msg:'To-Do sent to your manager — Step 1.',kind:'mocha'},{msg:'GT&C · Technology CoE queued — Step 2 (parallel).',kind:'info'}]);
	}

	/* 문서 본문 HTML — doc/raw 뷰가 공유(q='' 이면 하이라이트 마크 없음 → _mid 불변) */
	function bodyHtml(q){
		return BLOCKS.map(function(b){
			if(b.tag==='h1') return '<h1 class="dbH1">'+hlDoc(b.text,q)+'</h1>';
			if(b.tag==='meta') return '<div class="dbMeta">'+hlDoc(b.text,q)+'</div>';
			if(b.tag==='h2') return '<h2 class="dbH2">'+hlDoc(b.text,q)+'</h2>';
			return '<p class="dbP">'+hlDoc(b.text,q)+'</p>';
		}).join('');
	}
	function docFoot(){ return '<div class="dbFoot">Momentive Global Technology — '+esc(CUR.code)+' · Confidential to classification level</div>'; }
	/* 오프스크린에서 고정 폭(w) 레이아웃 높이만 측정 — SVG viewBox 높이를 정확히 맞춰 여백/잘림 방지 */
	function rlMeasure(html, w){
		var m=document.createElement('div');
		m.style.cssText='position:absolute;left:-9999px;top:0;width:'+w+'px;visibility:hidden;';
		m.innerHTML=html; document.body.appendChild(m);
		var h=m.firstChild? Math.ceil(m.firstChild.getBoundingClientRect().height) : w;
		document.body.removeChild(m); return h;
	}
	/* Original(원본) 뷰 — Document 콘텐츠를 고정 폭 SVG '페이지'로 박제.
	   foreignObject 안 HTML은 항상 794px로 레이아웃된 뒤 SVG 전체가 균일 스케일만 됨(리사이즈 무리플로우 = 편집 불가 원본 파일 질감). */
	function renderRaw(scroll){
		var W=794;
		var inner='<div class="rlDocPage">'+bodyHtml('')+docFoot()+'</div>';
		var H=rlMeasure('<div class="rlRawPage">'+inner+'</div>', W);
		scroll.innerHTML='<div class="rlRawWrap">'+
			'<div class="rlRawTag"><i class="material-symbols-outlined">picture_as_pdf</i>Original file · read-only snapshot</div>'+
			'<svg class="rlRawSvg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 '+W+' '+H+'">'+
				'<foreignObject x="0" y="0" width="'+W+'" height="'+H+'">'+
					'<div xmlns="http://www.w3.org/1999/xhtml" class="rlRawPage">'+inner+'</div>'+
				'</foreignObject></svg></div>';
	}
	function renderDoc(){
		_mid=0;
		var q=(document.getElementById('findInput').value||'').trim();
		var scroll=document.getElementById('docScroll');
		if(view==='raw'){ renderRaw(scroll); matchTotal=0; curMatch=-1; updateFind(); return; }
		if(view==='doc'){
			scroll.innerHTML='<div class="rlDocPage">'+bodyHtml(q)+docFoot()+'</div>';
		} else {
			var txt=BLOCKS.map(function(b){ return hlDoc(b.text,q); }).join('\n\n');
			scroll.innerHTML='<div class="rlDocText">'+txt+'</div>';
		}
		matchTotal=_mid; curMatch=matchTotal? (curMatch<0?0:Math.min(curMatch,matchTotal-1)) : -1;
		updateFind(); if(curMatch>=0) gotoMatch(curMatch, false);
	}
	function updateFind(){
		document.getElementById('findCount').textContent=(matchTotal? (curMatch+1):0)+' / '+matchTotal;
		var nav=document.querySelector('.rlFindNav'); if(nav) nav.classList.toggle('off', matchTotal===0);
	}
	function gotoMatch(i, scroll){
		var marks=document.querySelectorAll('#docScroll mark'); if(!marks.length) return;
		marks.forEach(function(m){ m.classList.remove('cur'); });
		var m=document.getElementById('m'+i); if(!m){ m=marks[i]; }
		if(m){ m.classList.add('cur'); if(scroll!==false) m.scrollIntoView({block:'center'}); }
		curMatch=i; updateFind();
	}
	function stepMatch(d){ if(!matchTotal) return; curMatch=(curMatch+d+matchTotal)%matchTotal; gotoMatch(curMatch, true); }

	function setView(v){ view=v; curMatch=matchTotal?0:-1;
		document.querySelectorAll('#viewSeg a').forEach(function(a){ a.classList.toggle('on', a.getAttribute('data-view')===v); });
		var find=document.querySelector('.rlFind'); if(find) find.style.display=(v==='raw')?'none':'';   // 원본 스냅샷은 본문 검색 불가
		renderDoc();
	}

	function load(){
		var code=getParam('code')||'LEV-20-27';
		CUR=repByCode(code)||REPORTS[REPORTS.length-1];
		rlPushRecent(CUR.code);   // 실제로 연 문서를 최근 본 목록에 기록(이어보기용)
		BLOCKS=buildDoc(CUR);
		buildAppr(CUR);
		renderActs(CUR); renderInfo(CUR);
		var q=getParam('q'); document.getElementById('findInput').value=q||'';
		curMatch=q?0:-1;
		renderDoc();
		if(q) toast(matchTotal+' match'+(matchTotal!==1?'es':'')+' for “'+q+'” in this report.','mocha');
		if(apprMode==='approve'||apprMode==='owner') setTimeout(openApprModal, 240);
	}

	$(document).ready(function(){
		$('.sidenav').sidenav();
		$(document).on('click', '.sidenav-overlay, .closeBtns', function(){ $('.sidenav').sidenav('close'); });
		load();

		// 보기 토글
		document.getElementById('viewSeg').addEventListener('click', function(e){ var a=e.target.closest('a[data-view]'); if(a) setView(a.getAttribute('data-view')); });

		// 문서 내 검색
		var fi=document.getElementById('findInput');
		fi.addEventListener('input', function(){ curMatch=0; renderDoc(); });
		fi.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); stepMatch(e.shiftKey?-1:1); } });
		document.getElementById('findNext').addEventListener('click', function(){ stepMatch(1); });
		document.getElementById('findPrev').addEventListener('click', function(){ stepMatch(-1); });

		// 액션(목업)
		document.addEventListener('click', function(e){
			if(e.target.closest('#infoClose')){ toggleInfo(); return; }
			if(e.target.closest('#clsRow')){ toggleGate(); return; }
			var b=e.target.closest('[data-act]'); if(!b) return; var act=b.getAttribute('data-act');
			if(act==='info'){ toggleInfo(); return; }
			if(act==='approval'){ toggleApprLayer(); return; }
			var locked=(CUR.cls>=3 && CUR.idx!==MY_REGION);
			if(act==='download'){ if(locked) toast('Download blocked — Class '+CUR.cls+' is region-restricted ('+idxName(CUR.idx)+').','warn'); else toast('Downloading '+CUR.code+'… (mock)','mocha'); return; }
			if(act==='print') toast('Preparing print view… (mock)','info');
			else if(act==='basket') toast('Added '+CUR.code+' to basket.','ok');
			else if(act==='share') toast('Share link copied — '+location.origin+location.pathname+'?code='+CUR.code,'mocha');
		});

		// 헤더 글로벌 검색 안내
		var gq=document.getElementById('mainSrchInput');
		if(gq) gq.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); location.href='apis_rptlib_list.html'; } });

		// 결재 모달 위임(백드롭·닫기·Approve/Reject·Initiate)
		document.getElementById('rlApprModal').addEventListener('click', function(e){
			if(e.target.id==='rlApprModal'){ closeApprModal(); return; }
			if(e.target.closest('#apprClose')){ closeApprModal(); return; }
			var d=e.target.closest('.apprDo'); if(d){ apprAct(+d.getAttribute('data-i'), d.getAttribute('data-do')); return; }
			if(e.target.closest('#apprInit')){ apprInitiate(); return; }
		});
		document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeApprModal(); } });

		// 팝업 창(window.open)으로 열렸으면 Back 버튼 숨김 — OS/브라우저 창 닫기로 충분(인페이지 close 불필요).
		// 직접 진입(팝업 차단 폴백·URL 직접 열기)일 때만 'Back to list' 노출.
		var bk=document.getElementById('rlBack');
		if(bk && window.opener && !window.opener.closed){ bk.style.display='none'; }
	});
	</script>
</body>
</html>

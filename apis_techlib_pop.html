<!DOCTYPE html lang="en">
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MAPIS · Report Detail</title>
    <link rel="stylesheet" type="text/css" href="css/materialize.css">
    <link rel="stylesheet" type="text/css" href="css/mpm_common.css">
    <link type="text/css" rel="stylesheet" href="css/animate.min.css">
	<link rel="preload" href="mapis_lib/font/material-symbols-outlined.woff2" as="font" type="font/woff2">
	<link href="mapis_lib/css/material-symbols-local.css" type="text/css" rel="stylesheet">
	<!-- Summernote(lite) — SME Notes New Post 리치 에디터(ELN과 동일 스택) -->
	<link rel="stylesheet" type="text/css" href="mapis_lib/lib/summernote-0.9.0/summernote-lite.min.css">

    <script type="text/javascript" charset="utf-8" src="js/jquery-3.3.1.min.js"></script>
	<script type="text/javascript" charset="utf-8" src="mapis_lib/js/lib/jquery-ui-1.14.1.js"></script>
    <script type="text/javascript" charset="utf-8" src="js/materialize.js"></script>
	<script type="text/javascript" charset="utf-8" src="mapis_lib/lib/summernote-0.9.0/summernote-lite.min.js"></script>
	<script type="text/javascript" charset="utf-8" src="js/apis_util.js"></script>
	<script type="text/javascript" charset="utf-8" src="js/glass_engine.js"></script>
</head>
<body class="popup tlPop">
	<!-- MAPIS 팝업 표준 헤더 (eln_pop_simple 미러: 로고 + [코드]제목 + roundBox 상태 + 우측 액션) -->
	<header class="z-depth-1">
		<section class="titArea npi">
			<div><img src="img/MAPISLogo-25.png"></div>
			<div class="statusTit">
				<div class="tit"></span><span id="popTitle"></span></div>
			</div>
		</section>
	</header>

	<!-- 본문: Report Detail (2-pane) — 50px 고정 헤더 아래 채움 -->
	<div class="rlPopArea paneOpen">

		<!-- 2-pane -->
		<div class="rlPopBody">
			<!-- Document pane -->
			<section class="rlDocPane">
				<div class="rlDocBar">
					<div class="newAppleTab" id="viewSeg">
						<ul>
							<li class="waves-effect waves-hColor on" data-view="doc">Document</li>
							<li class="waves-effect waves-hColor" data-view="raw">Original</li>
							<li class="waves-effect waves-hColor" data-view="text">Text</li>
							<div class="tabBg"></div>
						</ul>
					</div>
					<div class="rlDocActs" id="docActs"></div>
						<div class="rlFind">
						<div class="aniInput"><input type="text" class="browser-default" id="findInput" placeholder="Find in document" autocomplete="off"><span class="focus-border"></span></div>
						<span class="rlFindNav"><span class="cnt" id="findCount">0 / 0</span>
							<i class="material-symbols-outlined" id="findPrev" title="Previous">keyboard_arrow_up</i>
							<i class="material-symbols-outlined" id="findNext" title="Next">keyboard_arrow_down</i></span>
					</div>
					<!-- Summary 패널 접힘 시에만 노출되는 열기 버튼(검색창 우측). paneOpen이면 CSS로 숨김 -->
					<a class="waves-effect waves-light hBtn hViva" id="infoOpen" data-act="info"><i class="material-icons left">chevron_left</i><span class="label">Summary</span></a>
				</div>
				<div class="rlDocScroll hScroll" id="docScroll"></div>
			</section>

		</div>
		<!-- Information pane — 우측 슬라이드오버 패널(토글로 숨김/표시) -->
		<aside class="typeList cardBox open" id="infoPane"></aside>
	</div>

	<!-- 결재(Approval) 모달 — JS가 채움. window.open 팝업 내부 오버레이 -->
	<div class="rlModalWrap" id="rlApprModal"></div>

	<!-- SME Notes New Post 모달 — 실제 MAPIS SME Notes 등록 양식 미러(Title 필수 + Summernote 에디터 + 파일첨부) -->
	<article id="bucketModal" class="modal smeModal wd80p">
		<div class="modal-header mochaBg"><h5>SME Notes</h5><div class="closeBtns modal-close"><i class="material-icons">close</i></div></div>
		<div class="modal-content">
			<div class="inputArea">
				<div class="row"><div class="col s12"><label class="smeReq">Title</label><div class="aniInput"><input type="text" class="browser-default" id="bucketTitle" placeholder="Enter a title"><span class="focus-border"></span></div></div></div>
				<div class="row mt10"><div class="col s12"><div class="elnSummernote smeEditor" id="bucketBody"></div></div></div>
				<div class="row mt10"><div class="col s12"><div class="input-field file-field mt0">
					<div class="btn"><span>File</span><input type="file" id="bucketFile" multiple></div>
					<div class="file-path-wrapper"><input type="text" class="file-path" placeholder="No file chosen" autocomplete="off" spellcheck="false"></div>
				</div></div></div>
			</div>
			<div class="btnArea">
				<a href="javascript:;" class="waves-effect waves-light hBtn hBlue wd100px mr10" id="bucketSave"><i class="material-icons left">save</i><span class="label">Save</span></a>
				<a href="javascript:;" class="waves-effect waves-light hBtn hGrey wd100px modal-close"><i class="material-icons left">cancel</i><span class="label">Cancel</span></a>
			</div>
		</div>
	</article>

	<!-- SME Notes 상세 확인 모달 — 리스트 클릭 시 JS가 내용 채움 -->
	<article id="smeViewModal" class="modal smeModal wd80p">
		<div class="modal-header mochaBg"><h5 id="smeViewTit">SME Note</h5><div class="closeBtns modal-close"><i class="material-icons">close</i></div></div>
		<div class="modal-content" id="smeViewBody"></div>
	</article>

	<script>
	/* ════════════════════════════════════════════════════════════
	   Technical Report Hub — Report Detail / Reading View (목업).
	   2-pane(Document + Information) + 액션 툴바. Document/Text 토글.
	   문서 내 검색 + 키워드 하이라이트(리스트에서 넘어온 ?q= 프리필 + 직접 find).
	   엔진=목업: 문서를 "PDF처럼 스타일된 HTML"로 렌더 → 하이라이트=<mark> 문자열 매칭.
	   ════════════════════════════════════════════════════════════ */
	var INDEXES={CN:'CN — Shanghai',DE:'DE — Leverkusen',IN:'IN — Bangalore',IT:'IT — Termoli',JP:'JP — Ohta',KR:'KR — All Regions',TH:'Thailand',UK:'UK — Abingdon',US:'US — All Regions'};
	function idxName(id){ return INDEXES[id]||id; }
	/* 날짜 표시 포맷: 데이터는 ISO로 두고 화면 표시만 MM-DD-YYYY (list와 동일 규칙). */
	function fmtDate(d){ d=String(d||''); var m=d.match(/^(\d{4})-(\d{2})-(\d{2})/); return m? m[2]+'-'+m[3]+'-'+m[1] : d; }
	var TYPES={TIS:'TIS Report',TMR:'Tech / Market Review',PTM:'Process Transfer Memo',Trip:'Trip Report',IP:'Improvement Project'};
	function typeName(t){ return TYPES[t]||t; }
	var CLASSES={1:{nm:'Class 1 · Public',lock:false},2:{nm:'Class 2 · Internal',lock:false},3:{nm:'Class 3 · Confidential',lock:true},4:{nm:'Class 4 · Highly Restricted',lock:true}};
	var SEGMAP={Elastomers:'Performance Additives',Fluids:'Silicone Fluids',Coatings:'Coatings & Release',Resins:'Resins',Sealants:'Sealants & Adhesives',Specialty:'Specialty Fluids',Additives:'Urethane Additives','Personal Care':'Consumer Solutions'};
	function segOf(bu){ return SEGMAP[bu]||bu; }
	var MY_REGION='US';
	var bookmarks={};   // 즐겨찾기(code→true) — 리스트(opener)와 동일 모델. opener.bookmarks를 참조로 공유
	var basket={};      // 장바구니(code→true) — opener.basket 참조로 공유(담기 시 리스트 FAB/모달 즉시 반영)
	function isBookmarked(code){ return !!bookmarks[code]; }

	var REPORTS=[
		{code:'LEV-24-002',title:'Bio-based Silicone Feasibility Study (JDA)',type:'TIS',site:'LEV',idx:'DE',author:'Dr. Stephan Boß',bu:'Elastomers',date:'2026-06-14',cls:4,hits:162},
		{code:'KR-23-011',title:'Low-Temperature Cure Silicone for Flexible Display',type:'TIS',site:'KR',idx:'KR',author:'S.Y. Park',bu:'Specialty',date:'2026-06-12',cls:3,hits:274},
		{code:'ITC-22-031',title:'Antifoam Improvement Project — Phase 2',type:'IP',site:'ITC',idx:'IN',author:'Indumathi M.',bu:'Fluids',date:'2026-06-10',cls:2,hits:176},
		{code:'LEV-23-007',title:'Development of a Baking Paper Release Coating',type:'TIS',site:'LEV',idx:'DE',author:'Markus Bley',bu:'Coatings',date:'2026-06-05',cls:2,hits:352},
		{code:'TML-22-002',title:'Resin Intermediate Process Transfer Memorandum',type:'PTM',site:'TML',idx:'IT',author:'G. Rossi',bu:'Resins',date:'2026-05-28',cls:2,hits:205},
		{code:'KR-22-003',title:'OLED Encapsulation Adhesive — Scale-up Request',type:'PTM',site:'KR',idx:'KR',author:'J.P. Kim',bu:'Specialty',date:'2026-05-20',cls:2,hits:298},
		{code:'SH-21-008',title:'Defoamer Performance in Architectural Coatings',type:'TIS',site:'SH',idx:'CN',author:'Wei Zhang',bu:'Coatings',date:'2026-04-30',cls:2,hits:241},
		{code:'ABD-20-015',title:'Specialty Fluids for Personal Care Formulations',type:'TMR',site:'ABD',idx:'UK',author:'J. Whitfield',bu:'Personal Care',date:'2026-04-18',cls:1,hits:233},
		{code:'TT-18-012',title:'Water Phase Sensory Elastomer',type:'TIS',site:'TT',idx:'US',author:'Mukesh Kumar',bu:'Elastomers',date:'2026-03-22',cls:2,hits:359},
		{code:'SV-19-006',title:'Urethane Additives Applications Guide',type:'TMR',site:'SV',idx:'US',author:'L. Heisler',bu:'Additives',date:'2026-02-15',cls:2,hits:432},
		{code:'WTC-11-029',title:'In-situ Functionalized Nano Ceria Dispersions',type:'TIS',site:'WTC',idx:'IN',author:'Asha Jhonsi, Karthikeyan M.',bu:'Fluids',date:'2026-01-20',cls:2,hits:554},
		{code:'JPN-15-004',title:'Patent Survey for UV Curable Frontsheet',type:'TIS',site:'JPN',idx:'JP',author:'Kazuhisa Ono',bu:'Specialty',date:'2025-12-08',cls:3,hits:518},
		{code:'TT-12-016',title:'Silicone Fluids Technology Highlights — Annual',type:'TMR',site:'TT',idx:'US',author:'Global Silicone Fluids Tech',bu:'Fluids',date:'2025-11-30',cls:3,hits:374},
		{code:'JPN-10-007',title:'Effect of Crosslinkage and Reinforcement',type:'TIS',site:'JPN',idx:'JP',author:'H. Sato',bu:'Elastomers',date:'2025-10-05',cls:2,hits:572},
		{code:'TT-11-016',title:'Hydrosilylation with Iron-Pyridine Catalysts',type:'TIS',site:'TT',idx:'US',author:'Kenrick M. Lewis',bu:'Additives',date:'2025-06-25',cls:2,hits:798},
		{code:'LEV-20-027',title:'Liquid Silicone Rubber — Handbook of Processing',type:'TIS',site:'LEV',idx:'DE',author:'Enise Michalski',bu:'Elastomers',date:'2025-05-15',cls:2,hits:1441},
		{code:'BKK-21-019',title:'Sealant Field Trial Report — SE Asia',type:'Trip',site:'BKK',idx:'TH',author:'S. Phong',bu:'Coatings',date:'2026-05-12',cls:2,hits:188},
		{code:'SV-19-010',title:'Urethane Additives Technology Review',type:'TMR',site:'SV',idx:'US',author:'L. Heisler',bu:'Urethane Additives',date:'2026-02-10',cls:2,hits:388},
		{code:'2008-MPM-016',title:'SF1632 Part 1: Root Cause Analysis',type:'TIS',site:'WF',idx:'US',author:'Global Silicone Fluids Tech',bu:'Specialty Additives',date:'2025-11-12',cls:4,hits:379,acc:'granted'},
		{code:'JPN-09-024',title:'HCR New Portfolio; The Development Roadmap',type:'TIS',site:'JPN',idx:'JP',author:'T. Nakamura',bu:'Industrial',date:'2025-09-18',cls:3,hits:575,acc:'requested'},
		{code:'ITC-12-013',title:'Patentability Search: Acrylate Functional Silicones',type:'TIS',site:'ITC',idx:'IN',author:'Madhuri Raju, A. Dhanabalan',bu:'Specialty Additives',date:'2025-08-22',cls:1,hits:632},
		{code:'WTC-11-045',title:'Surface Modification of Ceria Using Silanes',type:'TIS',site:'WTC',idx:'IN',author:'Karthikeyan Murugesan',bu:'Tire & Silanes',date:'2025-07-30',cls:2,hits:636}
	];
	var SUMMARIES={
		'LEV-24-002':'Joint development assessment of bio-based silicone backbones from renewable feedstock; evaluates cure behavior, mechanical properties and cost parity versus petroleum-based grades.',
		'KR-23-011':'A low-temperature platinum-cure silicone for flexible OLED displays, characterizing cure kinetics below 100 °C and adhesion to polyimide substrates.',
		'ITC-22-031':'Phase-2 antifoam improvement project optimizing siloxane polyether dispersions to reduce foam in pulp and paper processing; includes plant trial data.',
		'LEV-23-007':'Development of a solvent-free silicone release coating for baking paper, balancing release force and anchorage on supercalendered kraft.',
		'TML-22-002':'Process transfer memorandum for a resin intermediate, detailing reactor parameters, distillation cuts and quality limits for scale-up at Termoli.',
		'KR-22-003':'Scale-up request for an OLED encapsulation adhesive, summarizing rheology, moisture-barrier performance and pot-life under production conditions.',
		'SH-21-008':'Comparative study of silicone defoamer performance in architectural water-based coatings, ranking persistence and recoatability.',
		'ABD-20-015':'Technology and market review of specialty fluids for personal-care formulations, covering sensory profiles and regulatory status in the EU and US.',
		'TT-18-012':'Water-phase sensory elastomer study evaluating thickening efficiency and skin-feel in cosmetic emulsions.',
		'SV-19-006':'Applications guide for urethane additive surfactants in flexible and rigid foam, with cell-structure and stability recommendations.',
		'WTC-11-029':'In-situ functionalized nano ceria dispersions for chemical-mechanical planarization, describing particle-size control and abrasive selectivity.',
		'JPN-15-004':'Patent landscape survey for UV-curable frontsheet materials in photovoltaic modules, identifying white-space and freedom-to-operate risks.',
		'TT-12-016':'Annual technology highlights for the silicone fluids portfolio, summarizing new hydrosilylation catalysts and emulsion advances.',
		'JPN-10-007':'Effect of crosslink density and silica reinforcement on the tensile and tear strength of high-consistency silicone rubber.',
		'TT-11-016':'Hydrosilylation catalyzed by iron–pyridine diimine complexes as a platinum-free alternative; reports kinetics and selectivity at 80 °C.',
		'LEV-20-027':'Handbook of liquid silicone rubber processing, covering injection molding, cure rheology and demolding for LSR parts.',
		'BKK-21-019':'Field trial of a one-part construction sealant across Southeast Asian climates, reporting weathering, adhesion and gunnability after twelve months.',
		'SV-19-010':'Technology review of urethane additive chemistries, mapping silicone surfactant structures to foam performance windows.',
		'2008-MPM-016':'Root-cause analysis of SF1632 fluid discoloration, tracing the issue to trace iron contamination in the hydrosilylation step.',
		'JPN-09-024':'Development roadmap for the high-consistency rubber portfolio, outlining new grades for automotive and electronics sealing.',
		'ITC-12-013':'Patentability search for acrylate-functional silicones, reviewing prior art on photo-curable backbone modifications.',
		'WTC-11-045':'Surface modification of ceria nanoparticles using organofunctional silanes to improve dispersion stability in polishing slurries.'
	};
	/* 단일 진실원본: 부모(list.html)의 REPORTS/SUMMARIES 우선 — pop 로컬 사본 staleness(누락 문서·drift) 회피. 딥링크면 로컬 폴백. */
	try{ if(window.opener && !window.opener.closed){ if(window.opener.REPORTS && window.opener.REPORTS.length) REPORTS=window.opener.REPORTS; if(window.opener.SUMMARIES) SUMMARIES=window.opener.SUMMARIES; if(typeof window.opener.MY_REGION==="string") MY_REGION=window.opener.MY_REGION; if(window.opener.bookmarks) bookmarks=window.opener.bookmarks; if(window.opener.basket) basket=window.opener.basket; } }catch(e){}
	function repByCode(c){ return REPORTS.filter(function(r){return r.code===c;})[0]; }
	function summaryOf(c){ return SUMMARIES[c]||''; }
	// 리스트 viewable(r)=cls<=2||acc==='granted' 와 동일 규칙 — Related 링크가 열람가능 문서를 잠금 없이 열도록.
	function viewableP(r){ return !!r && (r.cls<=2 || r.acc==='granted'); }
	function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
	function getParam(n){ var m=new RegExp('[?&]'+n+'=([^&]*)').exec(location.search); return m?decodeURIComponent(m[1].replace(/\+/g,' ')):''; }
	/* 최근 본 문서 기록(이어보기) — localStorage 'rlRecentDocs'(검색기록 'rlRecent'과 별개). Summary가 읽어 카드로 표시. */
	function rlPushRecent(code){ try{ var a=JSON.parse(localStorage.getItem('rlRecentDocs'))||[]; a=a.filter(function(c){return c!==code;}); a.unshift(code); localStorage.setItem('rlRecentDocs', JSON.stringify(a.slice(0,10))); }catch(e){} }

	// MAPIS 공통 글래스 토스트(js/glass_engine.js) 위임 — 커스텀 rlToast 폐기. kind(ok/info/warn/mocha)→glassToast type 매핑
	function toast(msg, kind){
		var map={ok:'ok', warn:'warn', info:'info', mocha:'info', err:'err'};
		glassToast(msg, map[kind]||'info');
	}
	function classBadge(c){ var ci=CLASSES[c]||CLASSES[2]; return '<span class="rlClassBadge c'+c+'">'+(ci.lock?'<i class="material-symbols-outlined">lock</i>':'')+'C'+c+'</span>'; }

	/* ── 문서 본문(목업) — 보고서 필드에서 섹션 생성. 검색어가 본문에 박히도록 구성 ── */
	function buildDoc(r){
		var sum=summaryOf(r.code), topic=r.title.replace(/\s*\(.*?\)\s*/g,'');
		return [
			{tag:'h1', text:r.title},
			{tag:'meta', text:r.code+'  ·  '+typeName(r.type)+'  ·  '+r.author+'  ·  '+idxName(r.idx)+'  ·  '+fmtDate(r.date)},
			{tag:'h2', text:'Abstract'},
			{tag:'p', text:sum},
			{tag:'h2', text:'1. Introduction'},
			{tag:'p', text:'This '+typeName(r.type)+' summarizes work carried out by the '+r.bu+' group ('+segOf(r.bu)+') at '+idxName(r.idx)+'. The study addresses '+topic.toLowerCase()+' with a focus on reproducibility, scale-up readiness and alignment with Momentive Global Technology priorities.'},
			{tag:'p', text:'Prior internal reports established the baseline performance for this chemistry. The present work extends that baseline and documents the experimental conditions, key results and recommendations for the '+r.bu+' portfolio.'},
			{tag:'h2', text:'2. Experimental'},
			{tag:'p', text:'Materials were prepared following standard '+r.bu+' protocols. Samples were characterized for the properties most relevant to '+topic.toLowerCase()+'. All measurements were performed in triplicate and reported as mean values; instrument calibration followed the '+idxName(r.idx)+' laboratory quality plan.'},
			{tag:'h2', text:'3. Results & Discussion'},
			{tag:'p', text:'The results confirm the trends anticipated from the abstract. Across the conditions evaluated, the formulation showed a favorable balance of performance and processability. '+r.author+' notes that the observed behavior is consistent with the proposed mechanism and supports the recommended direction for further development.'},
			{tag:'p', text:'A sensitivity analysis indicated that the dominant factor is the cure/processing window; secondary factors had a smaller but measurable effect. These findings are directly applicable to ongoing '+segOf(r.bu)+' projects.'},
			{tag:'h2', text:'4. Conclusion'},
			{tag:'p', text:'In summary, this report demonstrates a viable path for '+topic.toLowerCase()+'. The '+r.bu+' team recommends advancing to the next development stage, with the experimental details above serving as the reference baseline. Questions may be directed to '+r.author+' ('+idxName(r.idx)+').'}
		];
	}

	/* ── 하이라이트(전역 match index 부여 → find 내비게이션) ── */
	var _mid=0;
	function hlDoc(text, q){
		if(!q) return esc(text);
		var lo=String(text).toLowerCase(), ql=q.toLowerCase(), out='', i=0, p;
		if(!ql) return esc(text);
		while((p=lo.indexOf(ql,i))>=0){ out+=esc(text.slice(i,p))+'<mark id="m'+(_mid++)+'">'+esc(text.slice(p,p+ql.length))+'</mark>'; i=p+ql.length; }
		return out+esc(text.slice(i));
	}

	var CUR, BLOCKS, view='doc', matchTotal=0, curMatch=-1;

	function clsText(cls){ return '<span class="techlibClsTxt c'+cls+'">Class '+cls+'</span>'; }   // 리스트 우측 서머리와 동일 — Class 등급 색 텍스트(테두리 없음)
	/* 결재 완료 여부 — SME Notes 노출 게이트.
	   ① 결재 흐름에서 실제 approved 되었거나, ② 신규 제출/기안/결재 흐름이 아닌 이미 발행된 라이브러리 문서 열람이면 완료본으로 취급 */
	function apprIsDone(){
		if(APPR && APPR.status==='approved') return true;
		var m=getParam('mode');
		return getParam('new')!=='1' && m!=='owner' && m!=='approve';
	}
	/* Subject Matter Expert Notes — 결재 완료 문서의 Summary 패널 하단. 심플 리스트(13px) → 클릭 시 모달 상세.
	   풀에서 문서코드 해시로 결정적 선택(문서마다 다르게, 없는 문서도 많게). SME_CUR = 현재 문서에 표시 중인 노트 */
	var SME_POOL=[
		{ title:'Distributor Change & Implications — Red Iron Oxide RA11A', by:'Brendan O’Keefe', on:'25-Jun-2025',
			body:[
				{h:'Issue Summary', p:'New distributor (DeltaChem Korea) batches showed a slight D50 increase (~0.45 μm vs spec 0.3–0.4 μm) and higher batch-to-batch color variation (∆E > 1.0).'},
				{h:'Action Taken', p:'Tighter particle-size control requested; temporary hold on large-scale reformulation until the spec deviation is resolved. RA11B / Bayer 130M under screening.'},
				{h:'Recommendation', p:'Continue RA11A for low-performance, internal-use grades. For exterior/high-gloss, proceed only after additional QC confirmation.'}
			],
			replies:[ {usr:'Jongho Lee', date:'27-Jun-2025', txt:'Great cross-functional summary — looking forward to the QC confirmation on exterior applications.'} ] },

				? '<div class="aniInput"><textarea class="apprCmt materialize-textarea" data-i="'+i+'" maxlength="500" placeholder="(Optional)"></textarea><span class="focus-border"></div>'

				'<td class="apFnCell"><div class="apFn">'+esc(st.fn)+'</div></td>'+
				'<td class="apWho">'+esc(st.who)+'</td>'+
				'<td class="apStatus">'+statusCell+'</td>'+
				'<td class="apCmt">'+commentCell+'</td>'+
				'<td class="apDate">-</td>'+
				'<td class="apSub">'+submitCell+'</td></tr>';
		}
		// 시나리오 — 게이트 답이 필요한 결재자를 결정(JDA Yes→External n/a→GT&C 불필요, ITAR Yes→중단)
		var _s=APPR.steps;

		// 제출(Request) 행 — access 흐름과 동일하게 결재선 맨 위에 제출자 표시
		var reqRow='<tr class="approved"><td class="apStep" rowspan="1">STEP 1</td><td class="apTy"><span class="apTypeTag">Request</span></td><td class="apFnCell"><div class="apFn">Submitter</div></td><td class="apWho">'+esc(CUR.author||'—')+'</td><td class="apStatus">'+stBox('submitted')+'</td><td class="apCmt"><span class="apCmtTxt"></span></td><td class="apDate">-</td><td class="apSub"></td></tr>';
		var rows=reqRow+apprRow(_s[0],0,'<td class="apStep" rowspan="1">STEP 2</td>');

			var _s2c=1+(_gtcNeeded?1:0);

		var flow='<div class="fixedTable hBorderTable vMiddle smallFont mg0"><table class="rlApprTbl">'+

		// 분류 결정 트리 — 위 시나리오(_sc)로 lit path 렌더(우측 필로 경우의 수 테스트)
		var _pills='';
		[['c1','Class 1'],['c2','Class 2'],['c3','Class 3'],['c4','Class 4']].forEach(function(p){

		});

		_sc.path.forEach(function(g,_gi){
			var _k=g[0], _a=g[1], _yes=(_a==='Yes'), _no=(_a==='No');

			if(_gi>0) _tw+='<div class="dfConn lit"></div>';

	/* Approval = 상단 슬라이드다운 레이어(모달 아님, 비차단). 토글로 상시 켜둘 수 있음 */
	function renderApprLayer(){ var w=document.getElementById('rlApprModal'); if(w) w.innerHTML=(apprView==='access')?accessApprHtml():apprModalHtml(); }

	function apprSubmit(i){
		var st=APPR.steps[i]; if(!st) return;
		var modal=document.getElementById('rlApprModal');
		var sel=modal.querySelector('.apprSel[data-i="'+i+'"]');
		var cmt=modal.querySelector('.apprCmt[data-i="'+i+'"]');

			st.state='approved'; apprRecompute(); renderApprState(); renderApprLayer();
			if(APPR.status==='approved'){ notify([{msg:'All approvals complete — '+CUR.code+' published.',kind:'ok'},{msg:'Report number stamped on the cover page.',kind:'mocha'}]); renderInfo(CUR); }   // 완료 시 Summary 패널 재렌더 → SME Notes 노출
			else toast('Approved as '+st.fn+'. '+apprDone()+'/'+apprTotal()+' done.','ok');
		} else {
			st.state='rejected'; apprRecompute(); renderApprState(); renderApprLayer();
			toast('Rejected — returned to author with your reason.','warn');

	}
	function apprInitiate(){

		var row2='<tr class="'+(canAct?'apActive ':'')+(ACC.status==='granted'?'approved':(ACC.status==='denied'?'rejected':'pending'))+'">'+

			'<td class="apTy"><span class="apTypeTag">Approval</span></td>'+
			'<td class="apFnCell"><div class="apFn">Technology CoE Leader</div></td>'+
			'<td class="apWho">'+esc(ACC_LEADER)+'</td>'+

			'<thead><tr><th>Step</th><th>Type</th><th class="al">Function</th><th class="al">Assignee</th><th>Status</th><th class="al">Comments</th><th>Date</th><th></th></tr></thead>'+
			'<tbody>'+row1+row2+'</tbody></table></div>';
		// 요청(기안)은 본문 잠금 카드의 인라인 폼에서만 — 상단 레이어는 상태/결재 뷰 전용. draft면 힌트만.
		var reqForm='';

		else if(ACC.status==='granted')
			foot='<div class="rlApprFootBar"><span class="note"><i class="material-symbols-outlined">verified</i>Access granted. You can now view and download this report.</span></div>';
		else if(ACC.status==='denied')
			foot='<div class="rlApprFootBar"><span class="note"><i class="material-symbols-outlined">block</i>Request denied. Review the reason, revise and request again.</span></div>';

	function accSubmit(i){

	/* 문서 본문 HTML — doc/raw 뷰가 공유(q='' 이면 하이라이트 마크 없음 → _mid 불변) */
	function bodyHtml(q){
		return BLOCKS.map(function(b){
			if(b.tag==='h1') return '<h1 class="dbH1">'+hlDoc(b.text,q)+'</h1>';
			if(b.tag==='meta') return '<div class="dbMeta">'+hlDoc(b.text,q)+'</div>';
			if(b.tag==='h2') return '<h2 class="dbH2">'+hlDoc(b.text,q)+'</h2>';
			return '<p class="dbP">'+hlDoc(b.text,q)+'</p>';
		}).join('');
	}
	function docFoot(){ return '<div class="dbFoot">Momentive Global Technology — '+esc(CUR.code)+' · Confidential to classification level</div>'; }
	/* 오프스크린에서 고정 폭(w) 레이아웃 높이만 측정 — SVG viewBox 높이를 정확히 맞춰 여백/잘림 방지 */
	function rlMeasure(html, w){
		var m=document.createElement('div');
		m.style.cssText='position:absolute;left:-9999px;top:0;width:'+w+'px;visibility:hidden;';
		m.innerHTML=html; document.body.appendChild(m);
		var h=m.firstChild? Math.ceil(m.firstChild.getBoundingClientRect().height) : w;
		document.body.removeChild(m); return h;
	}
	/* Original(원본) 뷰 — Document 콘텐츠를 고정 폭 SVG '페이지'로 박제.
	   foreignObject 안 HTML은 항상 794px로 레이아웃된 뒤 SVG 전체가 균일 스케일만 됨(리사이즈 무리플로우 = 편집 불가 원본 파일 질감). */
	function renderRaw(scroll){
		var W=794;
		var inner='<div class="rlDocPage">'+bodyHtml('')+docFoot()+'</div>';
		var H=rlMeasure('<div class="rlRawPage">'+inner+'</div>', W);
		scroll.innerHTML='<div class="rlRawWrap">'+
			'<div class="rlRawTag"><i class="material-symbols-outlined">picture_as_pdf</i>Original file · read-only snapshot</div>'+
			'<svg class="rlRawSvg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 '+W+' '+H+'">'+
				'<foreignObject x="0" y="0" width="'+W+'" height="'+H+'">'+
					'<div xmlns="http://www.w3.org/1999/xhtml" class="rlRawPage">'+inner+'</div>'+
				'</foreignObject></svg></div>';
	}
	function renderDoc(){
		_mid=0;
		var q=(document.getElementById('findInput').value||'').trim();
		var scroll=document.getElementById('docScroll');
		if(cls4Locked()){ scroll.innerHTML=lockedHtml(); matchTotal=0; curMatch=-1; updateFind(); return; }
		if(view==='raw'){ renderRaw(scroll); matchTotal=0; curMatch=-1; updateFind(); return; }
		if(view==='doc'){
			scroll.innerHTML='<div class="rlDocPage">'+bodyHtml(q)+docFoot()+'</div>';
		} else {
			var txt=BLOCKS.map(function(b){ return hlDoc(b.text,q); }).join('\n\n');
			scroll.innerHTML='<div class="rlDocText">'+txt+'</div>';
		}
		matchTotal=_mid; curMatch=matchTotal? (curMatch<0?0:Math.min(curMatch,matchTotal-1)) : -1;
		updateFind(); if(curMatch>=0) gotoMatch(curMatch, false);
	}
	function updateFind(){
		document.getElementById('findCount').textContent=(matchTotal? (curMatch+1):0)+' / '+matchTotal;
		var nav=document.querySelector('.rlFindNav'); if(nav) nav.classList.toggle('off', matchTotal===0);
	}
	function gotoMatch(i, scroll){
		var marks=document.querySelectorAll('#docScroll mark'); if(!marks.length) return;
		marks.forEach(function(m){ m.classList.remove('cur'); });
		var m=document.getElementById('m'+i); if(!m){ m=marks[i]; }
		if(m){ m.classList.add('cur'); if(scroll!==false) m.scrollIntoView({block:'center'}); }
		curMatch=i; updateFind();
	}
	function stepMatch(d){ if(!matchTotal) return; curMatch=(curMatch+d+matchTotal)%matchTotal; gotoMatch(curMatch, true); }

	function setView(v){ view=v; curMatch=matchTotal?0:-1;
		document.querySelectorAll('#viewSeg li').forEach(function(a){ a.classList.toggle('on', a.getAttribute('data-view')===v); }); var _aL=document.querySelector('#viewSeg li.on'), _bg=document.querySelector('#viewSeg .tabBg'); if(_aL&&_bg) _bg.style.left=(_aL.offsetLeft-3)+'px';
		var find=document.querySelector('.rlFind'); if(find) find.style.display=(v==='raw')?'none':'';   // 원본 스냅샷은 본문 검색 불가
		renderDoc();
	}

	function load(){
		var code=getParam('code')||'LEV-20-027';
		CUR=repByCode(code);
		if(!CUR){   // REPORTS에 없는 코드 = newsub 등에서 넘어온 새 문서 → URL 파라미터로 CUR 구성
			if(getParam('title')) CUR={ code:code, title:getParam('title'), type:getParam('type')||'TIS',
				site:getParam('site')||getParam('idx')||'—', idx:getParam('idx')||MY_REGION, author:getParam('author')||'',
				bu:getParam('bu')||'—', date:getParam('date')||'', cls:+(getParam('cls')||2), hits:0 };
			else CUR=REPORTS[REPORTS.length-1];
		}
		if(CUR.cls>=1 && CUR.cls<=4) apprScenario='c'+CUR.cls;   // 결재 모달 결정트리 lit-path = 이 문서의 실제 등급
		rlPushRecent(CUR.code);   // 실제로 연 문서를 최근 본 목록에 기록(이어보기용)
		BLOCKS=buildDoc(CUR);
		buildAppr(CUR);
		if(accessLocked()){ apprView='access'; buildAcc(); }   // 잠긴 문서(C4 또는 C3 타지역) = 열람권한 요청 레이어
		renderActs(CUR); renderInfo(CUR);
		var q=getParam('q'); document.getElementById('findInput').value=q||'';
		curMatch=q?0:-1;
		renderDoc();
		if(q) toast(matchTotal+' match'+(matchTotal!==1?'es':'')+' for “'+q+'” in this report.','mocha');
		if(getParam('new')==='1') notify([{msg:'Submitted — '+CUR.code+'. Approval initiated.',kind:'ok'},{msg:'To-Do sent to your manager — Step 1.',kind:'mocha'},{msg:'GT&C · Technology CoE queued — Step 2 (parallel).',kind:'info'}]);   // 신규 제출 = 즉시 기안
		if((apprMode==='approve'||apprMode==='owner') && apprView==='access') setTimeout(openApprModal, 240);   // 발행 결재 이력은 이 팝업에서 안 보여줌(newsub에서 처리) — 열람권한 결재만 자동오픈   // 열람요청(accStatus)은 인라인 잠금카드로 표시 → 상단 레이어 자동오픈 안 함
	}

	$(document).ready(function(){
		$('.sidenav').sidenav();
		$(document).on('click', '.sidenav-overlay, .closeBtns', function(){ $('.sidenav').sidenav('close'); });
		load();

		// 보기 토글
		document.getElementById('viewSeg').addEventListener('click', function(e){ var a=e.target.closest('li[data-view]'); if(a) setView(a.getAttribute('data-view')); });

		// 문서 내 검색
		var fi=document.getElementById('findInput');
		fi.addEventListener('input', function(){ curMatch=0; renderDoc(); });
		fi.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); stepMatch(e.shiftKey?-1:1); } });
		document.getElementById('findNext').addEventListener('click', function(){ stepMatch(1); });
		document.getElementById('findPrev').addEventListener('click', function(){ stepMatch(-1); });

		// SME Notes 모달(New Post + 상세 확인) 1회 초기화 — item_pop과 동일 방식
		if(window.jQuery && $.fn.modal) $('#bucketModal, #smeViewModal').modal();
		// 문서 스크롤 영역 글래스 색수차 — glass_engine.js glassTrack 재사용(--olx/--oly/--ol-angle 커서 추적)
		if(window.glassTrack) $(document).on('mousemove', '.rlDocScroll', glassTrack);
		// New Post 리치 에디터(Summernote lite) — ELN wireEditorModule과 동일 설정, 첫 오픈 시 지연 초기화
		var smeEdInit=false;
		function ensureSmeEditor(){
			if(smeEdInit) return; smeEdInit=true;
			var $ed=window.jQuery?$('#bucketBody'):null; if(!$ed||!$ed.length) return;
			if($.fn.summernote){ $ed.summernote({ placeholder:'Write the note — background, findings, recommendation…', height:220, toolbar:[
				['style',['style']], ['font',['bold','italic','underline','strikethrough','clear']], ['color',['color']],
				['para',['ul','ol','paragraph']], ['table',['table']], ['insert',['link','picture']], ['view',['codeview']] ] }); }
			else { $ed.attr('contenteditable','true').addClass('elnSummernoteFallback').attr('data-ph','Write the note…'); }
		}

		// 액션(목업)
		document.addEventListener('click', function(e){
			if(e.target.closest('#infoClose')){ toggleInfo(); return; }
			if(e.target.closest('.smeNewPost')){ if(window.jQuery && $.fn.modal){ ensureSmeEditor(); $('#bucketModal').modal('open'); } return; }   // New Post 열기
			var si=e.target.closest('.smeItem'); if(si){ openSmeView(+si.getAttribute('data-i')); return; }   // 리스트 클릭 → 상세 모달
			if(e.target.closest('#bucketSave')){ var _t=(document.getElementById('bucketTitle').value||'').trim(); if(!_t){ toast('A title is required.','warn'); return; } toast('SME note posted — '+CUR.code+'. (mock)','ok'); document.getElementById('bucketTitle').value=''; if($.fn.summernote){ $('#bucketBody').summernote('reset'); } if(window.jQuery && $.fn.modal) $('#bucketModal').modal('close'); return; }
			if(e.target.closest('.smeMock')){ toast('Comment added. (mock)','ok'); return; }   // Reply(목업)
			var b=e.target.closest('[data-act]'); if(!b) return; var act=b.getAttribute('data-act');
			if(act==='info'){ toggleInfo(); return; }
			if(act==='approval'){ toggleApprLayer(); return; }
			if(act==='reqaccess'){ accFormOpen=true; renderDoc(); focusReason(); return; }   // 인라인 기안 폼(상단 Approval 레이어 안 띄움)
			if(act==='reqcancel'){ accFormOpen=false; renderDoc(); return; }
			if(act==='reqsubmit'){ accRequest(); openApprModal(); return; }
			if(accessLocked() && act==='download'){ accFormOpen=true; renderDoc(); focusReason(); return; }   // 잠긴 문서 다운로드 = 인라인 열람요청
			if(act==='download'){ toast('Downloading '+CUR.code+'… (mock)','mocha'); return; }
			if(act==='print'){ window.print(); return; }
			else if(act==='basket'){ toggleBasket(); return; }
			else if(act==='bookmark'){ toggleBookmark(); return; }
			else if(act==='share') toast('Share link copied — '+location.origin+location.pathname+'?code='+CUR.code,'mocha');
		});

		// 헤더 글로벌 검색 안내
		var gq=document.getElementById('mainSrchInput');
		if(gq) gq.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); location.href='apis_techlib_list.html'; } });

		// 결재 모달 위임(백드롭·닫기·Approve/Reject·Initiate)
		var apprModalEl=document.getElementById('rlApprModal');
		apprModalEl.addEventListener('click', function(e){
			if(e.target.id==='rlApprModal'){ closeApprModal(); return; }
			if(e.target.closest('#apprClose')){ closeApprModal(); return; }
			var pp=e.target.closest('.dfPill'); if(pp){ apprScenario=pp.getAttribute('data-sc'); renderApprLayer(); return; }
			var d=e.target.closest('.apprSubmit'); if(d){ apprSubmit(+d.getAttribute('data-i')); return; }
			var as=e.target.closest('.accSubmit'); if(as){ accSubmit(+as.getAttribute('data-i')); return; }
			if(e.target.closest('#apprInit')){ apprInitiate(); return; }
		});
		// Decision 변경 → comment placeholder 토글(Not Approved=사유 필수, Approved=선택)
		apprModalEl.addEventListener('change', function(e){
			var as=e.target.closest('.accSel');
			if(as){ var ac=this.querySelector('.accCmt[data-i="'+as.getAttribute('data-i')+'"]'); if(ac){ if(as.value==='reject'){ ac.placeholder='(Required — reason to deny)'; } else { ac.placeholder='(Optional)'; ac.classList.remove('rlInErr'); } } return; }
			var s=e.target.closest('.apprSel'); if(!s) return;
			var cmt=this.querySelector('.apprCmt[data-i="'+s.getAttribute('data-i')+'"]');
			if(!cmt) return;
			if(s.value==='reject'){ cmt.placeholder='(Required — please provide a reason)'; }
			else { cmt.placeholder='(Optional)'; cmt.classList.remove('rlInErr'); }
		});
		// 사유 입력 시작하면 검증 에러 강조 해제
		apprModalEl.addEventListener('input', function(e){
			var c=e.target.closest('.apprCmt'); if(c && c.value.trim()) c.classList.remove('rlInErr');
		});
		document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeApprModal(); } });

		// 팝업 창(window.open)으로 열렸으면 Back 버튼 숨김 — OS/브라우저 창 닫기로 충분(인페이지 close 불필요).
		// 직접 진입(팝업 차단 폴백·URL 직접 열기)일 때만 'Back to list' 노출.
		var bk=document.getElementById('rlBack');
		if(bk && window.opener && !window.opener.closed){ bk.style.display='none'; }
	});
	</script>
</body>
</html>
